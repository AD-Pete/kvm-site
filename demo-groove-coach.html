<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>KVM — Groove Coach</title>
<style>
  :root{
    --ink:#0a0a0f; --bone:#f4f1ea; --magenta:#ff2d78; --volt:#c8ff2d;
    --ease:cubic-bezier(0.2,0,0,1);
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-t:env(safe-area-inset-top,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior:none;}
  body{background:var(--ink);color:var(--bone);font-family:"Archivo","Helvetica Neue",Arial,sans-serif;
    overflow:hidden;-webkit-font-smoothing:antialiased;}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}

  /* ---------- stage: full-bleed reels frame ---------- */
  #stage{position:fixed;inset:0;}
  #video{display:none;}
  #canvas{position:absolute;inset:0;width:100%;height:100%;}
  /* top + bottom scrims, reels-style */
  #stage::before,#stage::after{content:"";position:absolute;left:0;right:0;height:22%;pointer-events:none;z-index:1;}
  #stage::before{top:0;background:linear-gradient(#0a0a0fb3,transparent);}
  #stage::after{bottom:0;background:linear-gradient(transparent,#0a0a0fd9);}

  /* ---------- beat pips (top, like reels progress) ---------- */
  #pips{position:absolute;top:calc(var(--safe-t) + 10px);left:12px;right:12px;display:flex;gap:4px;z-index:3;}
  #pips i{flex:1;height:3px;border-radius:2px;background:#ffffff2e;transition:background .12s linear,box-shadow .12s linear;}
  #pips i.on{background:var(--volt);box-shadow:0 0 8px #c8ff2d99;}
  #pips i.one{background:#ffffff52;}
  #pips i.one.on{background:var(--magenta);box-shadow:0 0 8px #ff2d7899;}

  /* ---------- header ---------- */
  #head{position:absolute;top:calc(var(--safe-t) + 24px);left:14px;z-index:3;display:flex;align-items:center;gap:8px;}
  #head .logo{font-weight:900;font-size:.95rem;letter-spacing:.1em;}
  #head .live{font-size:.55rem;letter-spacing:.25em;padding:4px 8px;border-radius:6px;background:#ff2d78;color:#fff;font-weight:700;}

  /* ---------- right action rail (tiktok style) ---------- */
  #rail{position:absolute;right:8px;bottom:calc(var(--safe-b) + 96px);z-index:3;display:flex;flex-direction:column;gap:18px;align-items:center;}
  .act{width:52px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;
    transition:scale .15s var(--ease);will-change:scale;}
  .act:active{scale:.96;}
  .act::before{content:"";position:absolute;inset:-6px;}/* ≥40px hit area */
  .act .bubble{width:52px;height:52px;border-radius:26px;display:flex;align-items:center;justify-content:center;
    background:#0a0a0f80;backdrop-filter:blur(12px);
    box-shadow:0 0 0 1px #ffffff1f, 0 4px 16px #00000059;
    font-weight:900;font-size:.95rem;font-variant-numeric:tabular-nums;}
  .act .bubble.volt{color:var(--volt);}
  .act .bubble.mag{color:var(--magenta);}
  .act .lbl{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:#ffffffb3;text-shadow:0 1px 4px #000;}
  .act svg{width:22px;height:22px;stroke:var(--bone);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .act[data-off] svg{opacity:.35;}

  /* ---------- judge flash ---------- */
  #judge{position:absolute;top:34%;left:50%;translate:-50% -50%;z-index:2;
    font-size:clamp(2rem,10vw,3.4rem);font-weight:900;text-transform:uppercase;
    opacity:0;pointer-events:none;text-shadow:0 2px 24px #000c;}

  /* ---------- coach caption (bottom-left, reels caption) ---------- */
  #caption{position:absolute;left:14px;right:76px;bottom:calc(var(--safe-b) + 18px);z-index:3;}
  #caption .who{font-weight:700;font-size:.85rem;}
  #caption .who b{color:var(--volt);}
  #caption .line{margin-top:4px;font-size:.9rem;line-height:1.4;color:#e8e4dacc;text-wrap:pretty;
    text-shadow:0 1px 6px #000a;min-height:2.5em;}
  #caption .beatnum{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;
    border-radius:11px;background:#ffffff1f;backdrop-filter:blur(8px);font-size:.72rem;font-weight:900;
    font-variant-numeric:tabular-nums;margin-right:6px;vertical-align:-4px;}

  /* ---------- settings sheet ---------- */
  #sheetWrap{position:fixed;inset:0;z-index:8;visibility:hidden;}
  #sheetWrap.open{visibility:visible;}
  #sheetWrap .back{position:absolute;inset:0;background:#0006;opacity:0;transition:opacity .25s var(--ease);}
  #sheetWrap.open .back{opacity:1;}
  #sheet{position:absolute;left:0;right:0;bottom:0;background:#14141c;border-radius:20px 20px 0 0;
    padding:12px 20px calc(var(--safe-b) + 24px);
    translate:0 105%;transition:translate .32s var(--ease);will-change:translate;
    box-shadow:0 -1px 0 #ffffff14, 0 -12px 40px #0009;}
  #sheetWrap.open #sheet{translate:0 0;}
  #sheet .grab{width:36px;height:4px;border-radius:2px;background:#ffffff33;margin:0 auto 18px;}
  #sheet .row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;min-height:44px;}
  #sheet .row+.row{box-shadow:0 -1px 0 #ffffff0f;}
  #sheet label{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:#999;}
  #sheet input[type=range]{accent-color:var(--magenta);width:52%;}
  #bpmVal{font-weight:900;color:var(--volt);font-variant-numeric:tabular-nums;margin-left:8px;}
  .switch{position:relative;width:46px;height:28px;}
  .switch input{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .switch i{position:absolute;inset:0;border-radius:14px;background:#ffffff24;transition:background .2s var(--ease);}
  .switch i::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:11px;background:#fff;
    transition:translate .2s var(--ease);}
  .switch input:checked + i{background:var(--volt);}
  .switch input:checked + i::after{translate:18px 0;}

  /* ---------- start overlay ---------- */
  #overlay{position:fixed;inset:0;z-index:10;background:#0a0a0ff0;backdrop-filter:blur(14px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:24px;transition:opacity .5s var(--ease);}
  #overlay.gone{opacity:0;pointer-events:none;}
  #overlay .stagger{opacity:0;translate:0 16px;animation:up .6s var(--ease) forwards;}
  #overlay .stagger:nth-child(2){animation-delay:.1s;}
  #overlay .stagger:nth-child(3){animation-delay:.2s;}
  #overlay .stagger:nth-child(4){animation-delay:.3s;}
  @keyframes up{to{opacity:1;translate:0 0;}}
  #overlay h1{font-size:clamp(2.4rem,11vw,4rem);font-weight:900;text-transform:uppercase;line-height:.95;
    letter-spacing:-.02em;text-wrap:balance;}
  #overlay h1 span{background:linear-gradient(100deg,var(--magenta),#6c3bff,var(--volt));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  #overlay p{color:#a09c92;max-width:38ch;margin:18px 0 28px;line-height:1.55;font-size:.95rem;text-wrap:pretty;}
  #startBtn{background:var(--volt);color:var(--ink);font-weight:900;text-transform:uppercase;letter-spacing:.12em;
    padding:16px 40px;font-size:1rem;border-radius:16px;
    box-shadow:0 0 0 1px #ffffff2e inset, 0 8px 30px #c8ff2d3d;
    transition:scale .15s var(--ease), box-shadow .2s var(--ease);will-change:scale;}
  #startBtn:active{scale:.96;}
  #startBtn:disabled{opacity:.5;}
  #overlay .status{margin-top:16px;font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:#777;}

  @media (prefers-reduced-motion:reduce){
    #overlay .stagger{animation:none;opacity:1;translate:0 0;}
  }
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="pips" aria-hidden="true"></div>

  <div id="head">
    <span class="logo">KVM</span>
    <span class="live" id="liveTag" hidden>LIVE</span>
  </div>

  <div id="judge"></div>

  <div id="rail">
    <button class="act" id="accAct" aria-label="On-beat accuracy">
      <span class="bubble volt" id="statAcc">0%</span><span class="lbl">On beat</span>
    </button>
    <button class="act" id="streakAct" aria-label="Streak">
      <span class="bubble mag" id="statStreak">0</span><span class="lbl">Streak</span>
    </button>
    <button class="act" aria-label="Total hits">
      <span class="bubble" id="statHits">0</span><span class="lbl">Hits</span>
    </button>
    <button class="act" id="voiceAct" aria-label="Toggle voice cues">
      <span class="bubble"><svg viewBox="0 0 24 24"><path d="M12 3v10a3 3 0 1 1-2-2.83"/><path d="M16 5c2 1.5 2 6.5 0 8"/><path d="M19 3c3 2.5 3 9.5 0 12"/></svg></span>
      <span class="lbl">Voice</span>
    </button>
    <button class="act" id="gearAct" aria-label="Settings">
      <span class="bubble"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3.9a7 7 0 0 0-2-1.2L14.2 3h-4l-.4 2.6a7 7 0 0 0-2 1.2l-2.3-.9-2 3.4 2 1.5a7 7 0 0 0 0 2.4l-2 1.5 2 3.4 2.3-.9a7 7 0 0 0 2 1.2l.4 2.6h4l.4-2.6a7 7 0 0 0 2-1.2l2.3.9 2-3.4-2-1.5c.06-.4.1-.8.1-1.2z"/></svg></span>
      <span class="lbl">Tune</span>
    </button>
  </div>

  <div id="caption">
    <div class="who">@kvm_coach <b>· LV.1 Groove</b></div>
    <div class="line" id="coachLine"><span class="beatnum" id="beatNum">–</span>Camera on, volume up. Land your moves on the kick.</div>
  </div>
</div>

<div id="sheetWrap">
  <div class="back" id="sheetBack"></div>
  <div id="sheet" role="dialog" aria-label="Settings">
    <div class="grab"></div>
    <div class="row">
      <label>Tempo <span id="bpmVal">96</span></label>
      <input type="range" id="bpm" min="70" max="130" value="96" step="1">
    </div>
    <div class="row">
      <label>Voice cues</label>
      <span class="switch"><input type="checkbox" id="voiceOn" checked><i></i></span>
    </div>
    <div class="row">
      <label>Skeleton overlay</label>
      <span class="switch"><input type="checkbox" id="skelOn" checked><i></i></span>
    </div>
  </div>
</div>

<div id="overlay">
  <h1 class="stagger">Find <span>the pocket.</span></h1>
  <p class="stagger">Full body in frame — step back until your feet are visible. Every move you land ON the beat scores. The coach counts you in.</p>
  <button id="startBtn" class="stagger">Start dancing</button>
  <div class="status stagger" id="loadStatus">All processing is local — no video leaves your device</div>
</div>

<script type="module">
/* KVM Groove Coach — pose + beat + voice, all on-device.
   Pose: MediaPipe PoseLandmarker (33 pts incl. hands: 17-22, feet: 29-32) */
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const $ = id => document.getElementById(id);
const video = $("video"), canvas = $("canvas"), ctx = canvas.getContext("2d");
const VOLT = "#c8ff2d", MAGENTA = "#ff2d78", BONE = "#f4f1ea";

/* beat pips */
const pips = $("pips");
for(let i = 0; i < 8; i++){ const p = document.createElement("i"); if(i === 0) p.className = "one"; pips.appendChild(p); }

/* ---------- state ---------- */
let landmarker = null, audio = null, running = false;
let bpm = 96, beatTimes = [], beatIndex = 0;
let hits = 0, onBeatHits = 0, streak = 0, recent = [], lastSpeak = 0;

$("bpm").oninput = e => { bpm = +e.target.value; $("bpmVal").textContent = bpm; };

/* settings sheet */
const sheetWrap = $("sheetWrap");
$("gearAct").onclick = () => sheetWrap.classList.add("open");
$("sheetBack").onclick = () => sheetWrap.classList.remove("open");
/* voice quick-toggle on rail mirrors the sheet switch */
$("voiceAct").onclick = () => {
  const c = $("voiceOn"); c.checked = !c.checked;
  $("voiceAct").toggleAttribute("data-off", !c.checked);
};
$("voiceOn").onchange = e => $("voiceAct").toggleAttribute("data-off", !e.target.checked);

/* ---------- voice ---------- */
function speak(text, force){
  $("coachLine").innerHTML = `<span class="beatnum" id="beatNum">${$("beatNum")?.textContent ?? "–"}</span>${text}`;
  if(!$("voiceOn").checked) return;
  const now = performance.now();
  if(!force && now - lastSpeak < 3500) return;
  lastSpeak = now;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.05; u.volume = 0.9;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- beat engine ---------- */
function makeAudio(){
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  const master = ac.createGain(); master.gain.value = 0.5; master.connect(ac.destination);
  const kick = t => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(48, t + .11);
    g.gain.setValueAtTime(1, t); g.gain.exponentialRampToValueAtTime(.001, t + .24);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + .26);
  };
  const hat = t => {
    const buf = ac.createBuffer(1, ac.sampleRate * .05, ac.sampleRate), d = buf.getChannelData(0);
    for(let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) ** 2;
    const s = ac.createBufferSource(); s.buffer = buf;
    const hp = ac.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 7000;
    const g = ac.createGain(); g.gain.value = .22;
    s.connect(hp); hp.connect(g); g.connect(master); s.start(t);
  };
  let nextBeat = 0, timer = null;
  return {
    ac,
    start(){
      nextBeat = ac.currentTime + .4; beatTimes = []; beatIndex = 0;
      timer = setInterval(() => {
        const spb = 60 / bpm;
        while(nextBeat < ac.currentTime + .25){
          kick(nextBeat); hat(nextBeat + spb / 2);
          beatTimes.push(nextBeat); if(beatTimes.length > 64) beatTimes.shift();
          const idx = (beatIndex++) % 8;
          setTimeout(() => onBeatVisual(idx), Math.max(0, (nextBeat - ac.currentTime) * 1000));
          nextBeat += spb;
        }
      }, 60);
    },
    stop(){ clearInterval(timer); }
  };
}
function onBeatVisual(idx){
  [...pips.children].forEach((p, i) => p.classList.toggle("on", i === idx));
  const bn = $("beatNum"); if(bn) bn.textContent = idx + 1;
}

/* ---------- judging ---------- */
const nearestOffset = t => beatTimes.reduce((m, b) => Math.min(m, Math.abs(t - b)), Infinity);
function flashJudge(text, color){
  const j = $("judge"); j.textContent = text; j.style.color = color;
  j.animate(
    [{opacity: 0, translate: "-50% -50%", scale: .7},
     {opacity: 1, translate: "-50% -50%", scale: 1, offset: .25},
     {opacity: 0, translate: "-50% -62%", scale: 1.05}],
    {duration: 650, easing: "cubic-bezier(0.2,0,0,1)"});
}
function registerHit(tSec){
  const off = nearestOffset(tSec);
  hits++;
  const onBeat = off <= 0.19;
  if(off <= 0.10) flashJudge("ON BEAT", VOLT);
  else if(onBeat)  flashJudge("CLOSE", "#ffd54d");
  else             flashJudge("OFF", MAGENTA);
  streak = onBeat ? streak + 1 : 0;
  if(onBeat) onBeatHits++;
  recent.push(onBeat); if(recent.length > 10) recent.shift();
  $("statHits").textContent = hits;
  $("statStreak").textContent = streak;
  $("statAcc").textContent = Math.round(onBeatHits / hits * 100) + "%";
  coachTick();
}

/* ---------- coaching ---------- */
const LINES = {
  hot:  ["That's the pocket — stay right there.", "Locked in. Don't think, just ride it.", "Yes! Keep that streak alive."],
  warm: ["Almost — let the kick drum move you.", "Land the move ON the boom, not after it.", "Smaller and sharper. Hit the one."],
  cold: ["Reset. Listen for two bars, then move.", "Bounce in your knees first.", "You're rushing. Let the beat come to you."],
  idle: ["I can't judge what I can't see — bigger moves!", "Give me something — bounce on the beat."]
};
const pick = a => a[Math.random() * a.length | 0];
function coachTick(){
  if(recent.length < 6) return;
  const acc = recent.filter(Boolean).length / recent.length;
  speak(pick(acc > .7 ? LINES.hot : acc > .4 ? LINES.warm : LINES.cold));
}

/* ---------- pose ---------- */
const CONNECTIONS = [
  [11,12],[11,13],[13,15],[12,14],[14,16],          // torso + arms
  [11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28], // hips + legs
  [15,17],[15,19],[15,21],[16,18],[16,20],[16,22],  // hands: wrist→pinky/index/thumb
  [27,29],[29,31],[27,31],[28,30],[30,32],[28,32]   // feet: ankle→heel→toe triangles
];
const TRACKED = [19,20,31,32];        // index fingertips + toes drive the energy signal
const GLOW = [17,19,21,18,20,22,29,31,30,32]; // hand + foot points get magenta dots
let prevLm = null, prevT = 0, energyEMA = 0, lastHitAt = 0, lastMoveAt = 0;
let fit = {dx:0, dy:0, dw:0, dh:0};   // contain-fit rect of the video in the canvas

function processPose(result, tMs){
  const lm = result.landmarks?.[0];
  drawFrame(lm);
  if(!lm){ prevLm = null; return; }
  const tSec = audio.ac.currentTime;
  if(prevLm){
    const dt = Math.max(1e-3, (tMs - prevT) / 1000);
    let sp = 0;
    for(const i of TRACKED) sp += Math.hypot(lm[i].x - prevLm[i].x, lm[i].y - prevLm[i].y) / dt;
    sp /= TRACKED.length;
    const prevEMA = energyEMA;
    energyEMA = energyEMA * .72 + sp * .28;
    if(sp > .25) lastMoveAt = tMs;
    if(energyEMA > .55 && prevEMA <= .55 && tSec - lastHitAt > (60 / bpm) * .45){
      lastHitAt = tSec; registerHit(tSec);
    }
    if(tMs - lastMoveAt > 6000 && running){ lastMoveAt = tMs; speak(pick(LINES.idle)); }
  }
  prevLm = lm; prevT = tMs;
}

function drawFrame(lm){
  const w = canvas.width, h = canvas.height, vw = video.videoWidth, vh = video.videoHeight;
  if(!vw) return;
  // blurred cover fill behind, contain (zoomed-out, full body visible) on top — reels letterbox
  const cover = Math.max(w / vw, h / vh), cw = vw * cover, ch = vh * cover;
  const cont  = Math.min(w / vw, h / vh), dw = vw * cont,  dh = vh * cont;
  fit = {dx: (w - dw) / 2, dy: (h - dh) / 2, dw, dh};
  ctx.save();
  ctx.translate(w, 0); ctx.scale(-1, 1);   // mirror
  ctx.filter = "blur(24px) brightness(.5)";
  ctx.drawImage(video, (w - cw) / 2, (h - ch) / 2, cw, ch);
  ctx.filter = "none";
  ctx.drawImage(video, fit.dx, fit.dy, dw, dh);
  ctx.restore();
  ctx.fillStyle = "rgba(10,10,15,0.22)"; ctx.fillRect(0, 0, w, h);

  if(!lm || !$("skelOn").checked) return;
  const X = p => fit.dx + (1 - p.x) * fit.dw, Y = p => fit.dy + p.y * fit.dh;
  const spb = 60 / bpm;
  const since = beatTimes.length ? audio.ac.currentTime - beatTimes[beatTimes.length - 1] : 1;
  const nearBeat = since < .12 || since > spb - .12;
  ctx.lineWidth = Math.max(3, fit.dh * .005); ctx.lineCap = "round";
  ctx.strokeStyle = nearBeat ? VOLT : (streak > 0 ? BONE : "#b8b4aa");
  ctx.shadowColor = nearBeat ? VOLT : MAGENTA; ctx.shadowBlur = nearBeat ? 22 : 8;
  for(const [a, b] of CONNECTIONS){
    if((lm[a].visibility ?? 1) < .4 || (lm[b].visibility ?? 1) < .4) continue;
    ctx.beginPath(); ctx.moveTo(X(lm[a]), Y(lm[a])); ctx.lineTo(X(lm[b]), Y(lm[b])); ctx.stroke();
  }
  if((lm[0].visibility ?? 1) > .4){
    ctx.beginPath(); ctx.arc(X(lm[0]), Y(lm[0]) - fit.dh * .015, Math.max(9, fit.dh * .028), 0, Math.PI * 2); ctx.stroke();
  }
  ctx.fillStyle = MAGENTA; ctx.shadowColor = MAGENTA; ctx.shadowBlur = 14;
  for(const i of GLOW){
    if((lm[i].visibility ?? 1) < .4) continue;
    ctx.beginPath(); ctx.arc(X(lm[i]), Y(lm[i]), Math.max(4, fit.dh * .006), 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

/* ---------- loop ---------- */
let lastVideoTime = -1;
function loop(tMs){
  if(!running) return;
  if(video.currentTime !== lastVideoTime){
    lastVideoTime = video.currentTime;
    processPose(landmarker.detectForVideo(video, tMs), tMs);
  }
  requestAnimationFrame(loop);
}

function sizeCanvas(){
  const dpr = Math.min(2, devicePixelRatio || 1);
  canvas.width = innerWidth * dpr; canvas.height = innerHeight * dpr;
}
addEventListener("resize", sizeCanvas);

/* ---------- boot ---------- */
$("startBtn").onclick = async () => {
  const btn = $("startBtn"), status = $("loadStatus");
  btn.disabled = true;
  try{
    status.textContent = "Requesting camera…";
    const portrait = innerHeight > innerWidth;
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user",
               width:  { ideal: portrait ? 720 : 1280 },
               height: { ideal: portrait ? 1280 : 720 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    sizeCanvas();

    status.textContent = "Loading pose model…";
    const fileset = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    landmarker = await PoseLandmarker.createFromOptions(fileset, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO", numPoses: 1
    });

    audio = makeAudio();
    await audio.ac.resume();

    $("overlay").classList.add("gone");
    $("liveTag").hidden = false;
    running = true;
    requestAnimationFrame(loop);
    speak("Five, six, seven, eight!", true);
    setTimeout(() => { audio.start(); speak("Move ON the kick drum.", true); }, 1400);
  }catch(err){
    btn.disabled = false;
    status.textContent = "⚠ " + (err.name === "NotAllowedError"
      ? "Camera denied — allow access and retry."
      : "Failed: " + err.message);
  }
};
</script>
</body>
